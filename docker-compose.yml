version: "3.8"

services:
  # === CORE SERVICES ===
  filesystem-mcp:
    build: ./servers/filesystem-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/filesystem-mcp:latest
    container_name: unraid-mcp-filesystem
    volumes:
      - /mnt:/data:ro
    environment:
      - FILESYSTEM_ALLOWED_PATH=/data
    stdin_open: true
    tty: true

  system-info-mcp:
    build: ./servers/system-info-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/system-info-mcp:latest
    container_name: unraid-mcp-system-info
    privileged: true
    pid: "host"
    stdin_open: true
    tty: true

  sqlite-mcp:
    build: ./servers/sqlite-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/sqlite-mcp:latest
    container_name: unraid-mcp-sqlite
    volumes:
      - /mnt/user:/data
    environment:
      - SQLITE_DB_DIR=/data
    stdin_open: true
    tty: true

  docker-mcp:
    build: ./servers/docker-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/docker-mcp:latest
    container_name: unraid-mcp-docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    stdin_open: true
    tty: true

  check-host-mcp:
    build: ./servers/check-host-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/check-host-mcp:latest
    container_name: unraid-mcp-check-host
    stdin_open: true
    tty: true

  text-utility-mcp:
    build: ./servers/text-utility-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/text-utility-mcp:latest
    container_name: unraid-mcp-text-utility
    stdin_open: true
    tty: true

  # === MEDIA ===
  media-info-mcp:
    build: ./servers/media-info-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/media-info-mcp:latest
    container_name: unraid-mcp-media-info
    volumes:
      - /mnt/user:/data
    environment:
      - MEDIA_INFO_PATH=/data
    stdin_open: true
    tty: true

  media-convert-mcp:
    build: ./servers/media-convert-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/media-convert-mcp:latest
    container_name: unraid-mcp-media-convert
    volumes:
      - /mnt/user:/data
    environment:
      - MEDIA_CONVERT_PATH=/data
    stdin_open: true
    tty: true

  # === FILES & ARCHIVE ===
  archive-mcp:
    build: ./servers/archive-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/archive-mcp:latest
    container_name: unraid-mcp-archive
    volumes:
      - /mnt/user:/data
    environment:
      - ARCHIVE_PATH=/data
    stdin_open: true
    tty: true

  backup-mcp:
    build: ./servers/backup-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/backup-mcp:latest
    container_name: unraid-mcp-backup
    volumes:
      - /mnt/user:/data
      - /mnt/user/backups:/backup
    environment:
      - BACKUP_SOURCE=/data
      - BACKUP_DEST=/backup
    stdin_open: true
    tty: true

  finder-mcp:
    build: ./servers/finder-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/finder-mcp:latest
    container_name: unraid-mcp-finder
    volumes:
      - /mnt/user:/data
    environment:
      - FINDER_PATH=/data
    stdin_open: true
    tty: true

  diff-mcp:
    build: ./servers/diff-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/diff-mcp:latest
    container_name: unraid-mcp-diff
    volumes:
      - /mnt/user:/data
    stdin_open: true
    tty: true

  # === SYSTEM ===
  process-mcp:
    build: ./servers/process-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/process-mcp:latest
    container_name: unraid-mcp-process
    privileged: true
    pid: "host"
    stdin_open: true
    tty: true

  log-mcp:
    build: ./servers/log-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/log-mcp:latest
    container_name: unraid-mcp-log
    volumes:
      - /var/log:/var/log:ro
      - /mnt/user:/data
    environment:
      - LOG_PATH=/data
    stdin_open: true
    tty: true

  service-mcp:
    build: ./servers/service-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/service-mcp:latest
    container_name: unraid-mcp-service
    privileged: true
    volumes:
      - /run/dbus:/run/dbus:ro
    stdin_open: true
    tty: true

  # === DATA FORMATS ===
  yaml-mcp:
    build: ./servers/yaml-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/yaml-mcp:latest
    container_name: unraid-mcp-yaml
    stdin_open: true
    tty: true

  xml-mcp:
    build: ./servers/xml-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/xml-mcp:latest
    container_name: unraid-mcp-xml
    stdin_open: true
    tty: true

  csv-mcp:
    build: ./servers/csv-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/csv-mcp:latest
    container_name: unraid-mcp-csv
    volumes:
      - /mnt/user:/data
    environment:
      - CSV_PATH=/data
    stdin_open: true
    tty: true

  template-mcp:
    build: ./servers/template-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/template-mcp:latest
    container_name: unraid-mcp-template
    volumes:
      - /mnt/user:/data
    environment:
      - TEMPLATE_PATH=/data
    stdin_open: true
    tty: true

  # === MEDIA / IMAGE ===
  image-mcp:
    build: ./servers/image-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/image-mcp:latest
    container_name: unraid-mcp-image
    volumes:
      - /mnt/user:/data
    environment:
      - IMAGE_PATH=/data
    stdin_open: true
    tty: true

  encoding-mcp:
    build: ./servers/encoding-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/encoding-mcp:latest
    container_name: unraid-mcp-encoding
    volumes:
      - /mnt/user:/data
    environment:
      - ENCODING_PATH=/data
    stdin_open: true
    tty: true

  markdown-mcp:
    build: ./servers/markdown-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/markdown-mcp:latest
    container_name: unraid-mcp-markdown
    stdin_open: true
    tty: true

  # === DEV TOOLS ===
  git-mcp:
    build: ./servers/git-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/git-mcp:latest
    container_name: unraid-mcp-git
    volumes:
      - /mnt/user:/data
    environment:
      - GIT_REPO_PATH=/data
    stdin_open: true
    tty: true

  ssl-mcp:
    build: ./servers/ssl-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/ssl-mcp:latest
    container_name: unraid-mcp-ssl
    volumes:
      - /mnt/user:/data
    stdin_open: true
    tty: true

  # === UTILITIES ===
  cron-mcp:
    build: ./servers/cron-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/cron-mcp:latest
    container_name: unraid-mcp-cron
    stdin_open: true
    tty: true

  password-mcp:
    build: ./servers/password-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/password-mcp:latest
    container_name: unraid-mcp-password
    stdin_open: true
    tty: true

  uuid-mcp:
    build: ./servers/uuid-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/uuid-mcp:latest
    container_name: unraid-mcp-uuid
    stdin_open: true
    tty: true

  sort-mcp:
    build: ./servers/sort-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/sort-mcp:latest
    container_name: unraid-mcp-sort
    stdin_open: true
    tty: true

  color-mcp:
    build: ./servers/color-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/color-mcp:latest
    container_name: unraid-mcp-color
    stdin_open: true
    tty: true

  ipcalc-mcp:
    build: ./servers/ipcalc-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/ipcalc-mcp:latest
    container_name: unraid-mcp-ipcalc
    stdin_open: true
    tty: true

  mempalace-mcp:
    build: ./servers/mempalace-mcp
    image: ghcr.io/wildfirebill-unraid/unraid-mcp-servers/mempalace-mcp:latest
    container_name: unraid-mcp-mempalace
    volumes:
      - mempalace-data:/data
    environment:
      - MEMPALACE_PALACE_PATH=/data/palace
    stdin_open: true
    tty: true

volumes:
  mempalace-data:
